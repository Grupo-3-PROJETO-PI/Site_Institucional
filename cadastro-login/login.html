<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./assets/styles/login.css">
    <link rel="icon" type="png" href="./assets/midia/logo.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <title> ©2026 FlowTrak - Login</title>
</head>

<body>
    <div class="container-login">
        <div class="container-cor">
            <div class="navbar">
                <ul>
                    <li>
                            <a href="../index.html">
                                <i class="fa-solid fa-angle-left"></i> Home
                            </a>
                    </li>
                </ul>
            </div>
            <div class="content-login">
                <div class="login">
                        <div class="login-title">
                            <h1>Logar</h1>
                            <p>Estamos felizes com sua volta!</p>
                        </div>
                        <div class="login-inputs">
                            <div class="inputs-row gap-row">
                                <label for="ipt_email_login">E-mail:</label>
                                <input type="text" id="ipt_email_login" placeholder="Digite seu e-mail">
                            </div>
                            <div class="inputs-row">
                                <label for="ipt_senha_login">Senha:</label>
                                <input type="text" id="ipt_senha_login" placeholder="Digite sua senha">
                            </div>
                            <div class="inputs-links">
                                <div class="links-check">
                                    <label class="content-check">
                                        <input id="botao-check" type="checkbox" name="opcao">
                                        <span class="checkmark"></span>
                                        <span class="text-check">Continuar Conectado</span>
                                    </label>
                                </div>
                                <div class="links-senha">
                                    <a href="./esqueci_a_senha.html">Esqueci a senha</a>
                                </div>
                            </div>
                        </div>
                        <div class="login-button">
                            <div class="button-row">
                                <button onclick="logar()">Entrar</button>
                                <p>
                                    Não tem uma conta?
                                    <span>
                                        <a href="./cadastro.html">Cadastre-se</a>
                                    </span>
                                </p>
                            </div>
                            <div class="button-row">
                                <p class="empresa">© 2026 FlowTrak</p>
                            </div>
                        </div>
                </div>
            </div>
        </div>
    </div>

    <div class="container-aviso">
      <div class="content-aviso">
        <div class="row-btn">
            <i class="fa-regular fa-circle-xmark" id="btn_fechar_aviso"></i>
        </div>
        <div class="row-text">
          <div class="row-text-title">
              <h1>Aviso:</h1>
          </div>
          <div class="row-text-description">
              <p id="erro_status"></p>
          </div>
        </div>
      </div>
    </div>

    <div class="container-sucesso">
      <div class="content-sucesso">
        <div class="row-btn">
            <i class="fa-regular fa-circle-xmark" id="btn_fechar_sucesso"></i>
        </div>
        <div class="row-text">
          <div class="row-text-title">
              <h1>Aviso:</h1>
          </div>
          <div class="row-text-description">
              <p id="login_sucesso"></p>
          </div>
        </div>
      </div>
    </div>
</body>
</html>

<script src="./assets/js/login.js"></script>
